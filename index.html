<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌈 彩虹分層水實驗室 | Rainbow Water Lab</title>
    
    <!-- 核心依賴 (CDN) -->
    <!-- React 18 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Varela+Round&display=swap" rel="stylesheet">

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#F0F9FF',
                            primary: '#0EA5E9',
                            secondary: '#6366F1',
                            accent: '#F59E0B',
                            success: '#10B981',
                            danger: '#EF4444',
                        }
                    },
                    fontFamily: {
                        sans: ['"Noto Sans TC"', 'sans-serif'],
                        rounded: ['"Varela Round"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #F0F9FF;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .glass {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 4px; }
        
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            opacity: 1;
        }
        
        /* 證書專用字體效果 */
        .certificate-title {
            font-family: 'Times New Roman', serif;
            letter-spacing: 0.1em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .signature-font {
            font-family: 'Brush Script MT', cursive, 'Varela Round';
            font-style: italic;
        }

        /* 列印專用樣式 */
        @media print {
            @page { 
                size: A4 portrait; 
                margin: 0; 
            }
            body { 
                background: white !important; 
                margin: 0; 
                padding: 0; 
            }
            .no-print { 
                display: none !important; 
            }
            nav, footer {
                display: none !important;
            }
            
            /* 強制列印背景顏色與圖片 */
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            
            #root, main { padding: 0 !important; margin: 0 !important; }
            
            #printable-certificate {
                position: absolute !important;
                top: 0 !important;
                left: 0 !important;
                width: 100vw !important;
                height: 100vh !important;
                margin: 0 !important;
                box-shadow: none !important;
                transform: none !important;
                border: none !important;
                border-radius: 0 !important;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- 0. Icon Components (SVG) ---
        const Icons = {
            Home: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
            Settings: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>,
            Volume2: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>,
            VolumeX: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" x2="17" y1="9" y2="15"/><line x1="17" x2="23" y1="9" y2="15"/></svg>,
            Download: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>,
            Sliders: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>,
            Beaker: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M4.5 3h15"/><path d="M6 3v16a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V3"/><path d="M6 14h12"/></svg>,
            Turtle: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 10-2-2"/><path d="m14 10 2-2"/><path d="M13.4 17.5a5 5 0 0 1-7-4.2c0-3.5 1.5-6.1 4.3-5a5 5 0 0 1 6.5 2.8"/><path d="M19 18.5c1.4-1.1 2-2.5 2-4.5 0-3.9-2.3-5.5-5.3-5"/><path d="M22 13.5c0 3-1.8 5-4 5"/><path d="M5.2 13.5A5.6 5.6 0 0 1 4 10c0-1.8 1.1-3.3 2.5-4"/><path d="M5 20a4 4 0 0 1-4-4"/></svg>,
            Rabbit: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M13 19a4 4 0 0 0-4-4"/><path d="M17 19a4 4 0 0 1-4-4"/><path d="M15 3a5 5 0 0 1 5 5v13h-4"/><path d="M5 21a5 5 0 0 1 5-5h2a2 2 0 0 1 2 2v3"/><path d="M10 11.2C9.4 6 5 2 2 2"/></svg>,
            Refresh: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>,
            RotateCcw: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>,
            Edit: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>,
            Check: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="20 6 9 17 4 12"/></svg>,
            BookOpen: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
            Award: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>,
            Printer: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>
        };

        // --- 1. Default Data Config ---
        const DEFAULT_CUPS = [
            { id: 1, sugar: 0, colorClass: 'bg-blue-300', colorHex: '#93C5FD', name: '藍色杯 (0g)' },
            { id: 2, sugar: 20, colorClass: 'bg-yellow-400', colorHex: '#FACC15', name: '黃色杯 (20g)' },
            { id: 3, sugar: 40, colorClass: 'bg-orange-500', colorHex: '#F97316', name: '橙色杯 (40g)' },
            { id: 4, sugar: 60, colorClass: 'bg-red-600', colorHex: '#DC2626', name: '紅色杯 (60g)' },
        ];

        const FONT_SETTINGS = [
            { size: 'text-sm', label: '小小的' },
            { size: 'text-base', label: '小一點' },
            { size: 'text-lg', label: '剛剛好' },
            { size: 'text-xl', label: '大一點' },
            { size: 'text-2xl', label: '大大的' },
            { size: 'text-3xl', label: '超～大' },
        ];

        const QUIZ_DATA = [
            {
                question: "關於彩虹水的分層，以下哪一個說法是正確的？",
                options: [
                    "最上層的顏色水密度最小，最下層最大",
                    "最上層的顏色水密度最大，最下層最小",
                    "所有顏色水的密度都一樣大"
                ],
                correct: 0
            },
            {
                question: "如果你想讓一杯新調配的綠色水浮在試管的最上面，你應該怎麼做？",
                options: [
                    "加入非常多非常多的糖",
                    "完全不加糖或加最少的糖",
                    "隨便加多少糖都可以"
                ],
                correct: 1
            }
        ];

        // --- 2. Main Application ---
        const App = () => {
            // -- State --
            const [scene, setScene] = useState('welcome'); // welcome, lab, report, quiz, certificate
            
            // Lab State
            const [cupsData, setCupsData] = useState(DEFAULT_CUPS);
            const [layers, setLayers] = useState([]);
            const [usedCups, setUsedCups] = useState([]);
            const [isShaking, setIsShaking] = useState(false);
            const [showNotes, setShowNotes] = useState(false);
            const [isCustomizing, setIsCustomizing] = useState(false);
            const [isFinished, setIsFinished] = useState(false);
            
            // Quiz & Certificate State
            const [studentName, setStudentName] = useState('');
            const [quizStep, setQuizStep] = useState(0); 
            const [score, setScore] = useState(0);             // 記錄「第一次答對」的題數
            const [currentAttempts, setCurrentAttempts] = useState(0); // 記錄當前題目的嘗試次數
            
            // Preferences
            const [settingsOpen, setSettingsOpen] = useState(false);
            const [fontIndex, setFontIndex] = useState(2);
            const [speechRate, setSpeechRate] = useState(1.0);
            const [soundOn, setSoundOn] = useState(true);

            // -- Helper Functions --
            
            const speak = (text) => {
                if (!soundOn) return;
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-HK';
                utterance.rate = speechRate;
                window.speechSynthesis.speak(utterance);
            };

            const handlePour = (cup) => {
                if (usedCups.includes(cup.id)) return;

                const topLayer = layers[layers.length - 1];
                let isAllowed = false;
                
                if (layers.length === 0) {
                    isAllowed = true;
                } else {
                    if (Number(cup.sugar) < Number(topLayer.sugar)) {
                        isAllowed = true;
                    }
                }

                if (isAllowed) {
                    const feedbackTexts = ["哇！成功分層了！", "做得好！這層浮在上面了！", "沒錯，就是這樣！"];
                    if (layers.length + 1 < 4) {
                        speak(feedbackTexts[Math.floor(Math.random() * feedbackTexts.length)]);
                    }
                    
                    setLayers([...layers, cup]);
                    setUsedCups([...usedCups, cup.id]);

                    if (layers.length + 1 === 4) {
                        setTimeout(() => {
                            speak("太厲害了！你完成了彩虹水！請觀察一下你的成果，然後查看實驗原理。");
                            setIsFinished(true);
                        }, 1000);
                    }
                } else {
                    setIsShaking(true);
                    speak(`哎呀！${cup.name}太重了，會沉下去把顏色弄髒喔！試試看輕一點的？`);
                    setTimeout(() => setIsShaking(false), 500);
                }
            };

            const resetLab = () => {
                setLayers([]);
                setUsedCups([]);
                setIsFinished(false);
                speak("試管已清空，請重新調配");
            };

            const startExperiment = () => {
                setLayers([]);
                setUsedCups([]);
                setShowNotes(false);
                setIsShaking(false);
                setIsFinished(false);
                setIsCustomizing(false);
                setStudentName('');
                setQuizStep(0);
                setScore(0);
                setCurrentAttempts(0);
                setScene('lab');
                speak("實驗開始！請選擇一杯糖水倒入試管");
            };
            
            const handleCupUpdate = (index, newSugar) => {
                const updatedCups = [...cupsData];
                const val = Math.max(0, Number(newSugar));
                updatedCups[index].sugar = val;
                updatedCups[index].name = updatedCups[index].name.split(' (')[0] + ` (${val}g)`;
                setCupsData(updatedCups);
            };

            const startQuiz = () => {
                if (studentName.trim() === '') {
                    setIsShaking(true);
                    speak("請先輸入你的名字喔！");
                    setTimeout(() => setIsShaking(false), 500);
                    return;
                }
                setQuizStep(1);
                setCurrentAttempts(0);
                setScore(0);
                speak(QUIZ_DATA[0].question);
            };

            const handleQuizAnswer = (optionIndex) => {
                const currentQuestion = QUIZ_DATA[quizStep - 1];
                if (optionIndex === currentQuestion.correct) {
                    
                    // 如果是一次答對，才加分
                    if (currentAttempts === 0) {
                        setScore(prev => prev + 1);
                    }
                    
                    speak("答對了！太棒了！");
                    
                    if (quizStep < QUIZ_DATA.length) {
                        setTimeout(() => {
                            setQuizStep(quizStep + 1);
                            setCurrentAttempts(0); // 重設下一題的嘗試次數
                            speak(QUIZ_DATA[quizStep].question);
                        }, 1000);
                    } else {
                        setTimeout(() => {
                            setScene('certificate');
                            speak(`恭喜 ${studentName} 成功獲得實驗證書！`);
                        }, 1000);
                    }
                } else {
                    setIsShaking(true);
                    setCurrentAttempts(prev => prev + 1); // 增加錯誤嘗試次數
                    speak("不太對喔，再想想看密度的原理？");
                    setTimeout(() => setIsShaking(false), 600);
                }
            };

            // 取得獎項資訊 (依據正確題數)
            const getAwardInfo = () => {
                if (score === 2) return { text: '金獎', color: 'text-yellow-600', bg: 'bg-yellow-100', border: 'border-yellow-400', icon: '🥇' };
                if (score === 1) return { text: '銀獎', color: 'text-slate-500', bg: 'bg-slate-100', border: 'border-slate-300', icon: '🥈' };
                return { text: '銅獎', color: 'text-orange-700', bg: 'bg-orange-100', border: 'border-orange-400', icon: '🥉' };
            };

            const downloadHTML = () => {
                const html = document.documentElement.outerHTML;
                const blob = new Blob([html], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'Rainbow_Water_Lab.html';
                a.click();
            };

            const currentFontSize = FONT_SETTINGS[fontIndex].size;
            
            // Generate Date for Certificate
            const today = new Date();
            const dateString = `${today.getFullYear()}年${today.getMonth() + 1}月${today.getDate()}日`;

            return (
                <div className={`min-h-screen flex flex-col relative ${currentFontSize} text-slate-800 transition-all duration-300`}>
                    
                    {/* --- Navigation --- */}
                    <nav className="fixed top-0 w-full z-40 px-4 py-3 flex justify-between items-center pointer-events-none no-print">
                        <motion.button 
                            initial={{ x: -50, opacity: 0 }} animate={{ x: 0, opacity: 1 }}
                            onClick={() => { setScene('welcome'); speak("回到首頁"); }}
                            className="pointer-events-auto bg-white/90 backdrop-blur-md shadow-lg border border-white/50 px-4 py-2 rounded-full flex items-center gap-2 hover:bg-white transition-colors"
                        >
                            <Icons.Home />
                            <span className="font-bold hidden sm:inline">主頁</span>
                        </motion.button>

                        <div className="flex gap-3 pointer-events-auto">
                            <button 
                                onClick={() => setSoundOn(!soundOn)}
                                className={`p-3 rounded-full shadow-lg transition-all ${soundOn ? 'bg-brand-primary text-white' : 'bg-slate-200 text-slate-500'}`}
                            >
                                {soundOn ? <Icons.Volume2 /> : <Icons.VolumeX />}
                            </button>
                            <button 
                                onClick={() => setSettingsOpen(true)}
                                className="bg-brand-secondary text-white p-3 rounded-xl shadow-lg hover:bg-indigo-600 transition-transform active:scale-95"
                            >
                                <Icons.Sliders />
                            </button>
                        </div>
                    </nav>

                    {/* --- Settings Panel --- */}
                    <AnimatePresence>
                        {settingsOpen && (
                            <>
                                <motion.div 
                                    initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
                                    className="fixed inset-0 bg-black/20 z-40 backdrop-blur-sm no-print"
                                    onClick={() => setSettingsOpen(false)}
                                />
                                <motion.div 
                                    initial={{ x: '100%' }} animate={{ x: 0 }} exit={{ x: '100%' }}
                                    transition={{ type: "spring", damping: 25, stiffness: 200 }}
                                    className="fixed right-0 top-0 bottom-0 w-80 max-w-[90vw] bg-white z-50 shadow-2xl p-6 flex flex-col gap-6 no-print"
                                >
                                    <div className="flex justify-between items-center border-b pb-4">
                                        <h2 className="text-2xl font-bold flex items-center gap-2"><Icons.Settings /> 設定</h2>
                                        <button onClick={() => setSettingsOpen(false)} className="text-2xl font-bold text-slate-400">&times;</button>
                                    </div>
                                    <div className="space-y-4">
                                        <label className="font-bold text-slate-500">字體大小</label>
                                        <input 
                                            type="range" min="0" max="5" value={fontIndex}
                                            onChange={(e) => setFontIndex(Number(e.target.value))}
                                            className="w-full"
                                        />
                                        <p className="text-center font-bold">{FONT_SETTINGS[fontIndex].label}</p>
                                    </div>
                                    <div className="space-y-4">
                                        <label className="font-bold text-slate-500">語音速度</label>
                                        <div className="flex items-center gap-4">
                                            <Icons.Turtle className="text-green-600" />
                                            <input 
                                                type="range" min="0.5" max="1.0" step="0.1" value={speechRate}
                                                onChange={(e) => setSpeechRate(Number(e.target.value))}
                                                className="flex-1"
                                            />
                                            <Icons.Rabbit className="text-pink-500" />
                                        </div>
                                    </div>
                                </motion.div>
                            </>
                        )}
                    </AnimatePresence>

                    {/* --- Main Content --- */}
                    <main className="flex-1 container mx-auto px-4 pt-20 pb-24 relative overflow-hidden flex flex-col">
                        <AnimatePresence mode="wait">
                            
                            {/* 1. Welcome */}
                            {scene === 'welcome' && (
                                <motion.div key="welcome" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="m-auto text-center gap-8 py-10 no-print">
                                    <div className="text-8xl mb-8 animate-bounce">🌈</div>
                                    <h1 className="text-5xl md:text-6xl font-black text-slate-800 tracking-tight mb-4">
                                        彩虹<span className="text-brand-primary">分層水</span>實驗室
                                    </h1>
                                    <p className="text-slate-500 font-bold mb-10 max-w-lg mx-auto">
                                        糖加得越多，水就越「重」！讓我們一起用密度魔法，疊出彩虹吧！
                                    </p>
                                    <button onClick={startExperiment} className="bg-brand-accent text-white px-10 py-5 rounded-full text-2xl font-black shadow-lg hover:scale-105 transition-transform">
                                        開始實驗
                                    </button>
                                </motion.div>
                            )}

                            {/* 2. Lab */}
                            {scene === 'lab' && (
                                <motion.div key="lab" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="grid grid-cols-1 lg:grid-cols-2 gap-6 h-full w-full max-w-6xl mx-auto flex-1 no-print">
                                    {/* Left: Control Panel */}
                                    <div className="glass rounded-3xl p-6 shadow-lg flex flex-col relative">
                                        <div className="mb-4 flex flex-wrap gap-2 justify-between items-center">
                                            <h2 className="font-bold text-slate-500 flex items-center gap-2">🧪 調配區</h2>
                                            <div className="flex gap-2">
                                                <button 
                                                    onClick={resetLab}
                                                    className="px-3 py-1.5 rounded-lg text-sm font-bold flex items-center gap-1 transition-all bg-slate-100 text-slate-600 hover:bg-slate-200"
                                                >
                                                    <Icons.Refresh size={16}/> 重設試管
                                                </button>
                                                <button 
                                                    onClick={() => { setIsCustomizing(!isCustomizing); speak(isCustomizing ? "回到實驗模式" : "自訂模式"); }}
                                                    className={`px-3 py-1.5 rounded-lg text-sm font-bold flex items-center gap-1 transition-all ${isCustomizing ? 'bg-brand-primary text-white ring-2 ring-blue-300' : 'bg-slate-100 text-slate-500'}`}
                                                >
                                                    {isCustomizing ? <Icons.Check size={16}/> : <Icons.Edit size={16}/>}
                                                    {isCustomizing ? "完成設定" : "自訂"}
                                                </button>
                                            </div>
                                        </div>
                                        
                                        <div className="grid grid-cols-2 gap-4 flex-1">
                                            {cupsData.map((cup, idx) => {
                                                const isUsed = usedCups.includes(cup.id);
                                                if (isCustomizing) {
                                                    return (
                                                        <div key={`edit-${cup.id}`} className="rounded-2xl p-4 flex flex-col items-center bg-blue-50/50 border-2 border-brand-primary">
                                                            <div className={`w-12 h-12 rounded-full ${cup.colorClass} shadow-sm border-2 border-white mb-2`}></div>
                                                            <label className="text-xs font-bold text-slate-500 mb-1">糖分 (g)</label>
                                                            <input type="number" min="0" value={cup.sugar} onChange={(e) => handleCupUpdate(idx, e.target.value)} className="w-full text-center border-2 border-blue-200 rounded-lg py-2 font-black text-xl text-brand-primary bg-white"/>
                                                        </div>
                                                    );
                                                } else {
                                                    return (
                                                        <motion.button
                                                            key={`play-${cup.id}`} whileHover={!isUsed ? { scale: 1.02 } : {}} whileTap={!isUsed ? { scale: 0.95 } : {}}
                                                            onClick={() => handlePour(cup)} disabled={isUsed}
                                                            className={`relative rounded-2xl p-4 flex flex-col items-center border-2 transition-all ${isUsed ? 'opacity-40 grayscale border-slate-200 bg-slate-50' : 'bg-white border-slate-100 hover:border-brand-primary shadow-md'}`}
                                                        >
                                                            <div className="text-4xl mb-2">🥤</div>
                                                            <div className={`w-16 h-16 rounded-full ${cup.colorClass} shadow-inner mb-2 border-4 border-white`}></div>
                                                            <div className="font-black text-xl">{cup.sugar}g</div>
                                                            <div className="text-xs font-bold text-slate-400 mt-1">{cup.name.split(' ')[0]}</div>
                                                            {isUsed && <div className="absolute inset-0 flex items-center justify-center"><span className="bg-green-100 text-green-700 font-bold px-3 py-1 rounded-lg -rotate-12">已加入</span></div>}
                                                        </motion.button>
                                                    );
                                                }
                                            })}
                                        </div>
                                    </div>

                                    {/* Right: Observation Tube */}
                                    <div className="flex flex-col items-center justify-center relative bg-white/50 rounded-3xl border border-white/50 p-4">
                                        <h2 className="font-bold text-slate-500 mb-6">👁️ 觀察區</h2>
                                        <motion.div animate={isShaking ? { x: [-10, 10, -10, 10, 0] } : {}} className="relative w-40 h-[400px] border-x-4 border-b-4 border-slate-300 rounded-b-[3rem] bg-white/30 overflow-hidden shadow-2xl">
                                            <div className="absolute bottom-0 w-full flex flex-col-reverse">
                                                <AnimatePresence>
                                                    {layers.map((layer) => (
                                                        <motion.div key={layer.id} initial={{ height: 0 }} animate={{ height: '100px' }} transition={{ type: 'spring' }} className={`w-full ${layer.colorClass} relative flex items-center justify-center border-t border-white/20`} style={{ height: '100px' }}>
                                                            <span className="font-bold text-white/90 drop-shadow-md text-lg">{layer.sugar}g</span>
                                                        </motion.div>
                                                    ))}
                                                </AnimatePresence>
                                            </div>
                                        </motion.div>
                                        <div className="w-56 h-6 bg-slate-300 rounded-full mt-2 shadow-inner"></div>
                                        
                                        <div className="mt-8 w-full max-w-sm">
                                            {isFinished ? (
                                                <motion.button
                                                    initial={{ scale: 0.8 }} animate={{ scale: 1 }} whileHover={{ scale: 1.05 }}
                                                    onClick={() => setScene('report')}
                                                    className="w-full bg-brand-success text-white py-4 rounded-xl font-bold text-xl shadow-lg flex items-center justify-center gap-2 animate-bounce"
                                                >
                                                    <Icons.BookOpen /> 👀 查看實驗原理
                                                </motion.button>
                                            ) : (
                                                <div className="bg-yellow-50 border border-yellow-200 text-yellow-800 p-4 rounded-xl flex gap-3"><div className="text-2xl">💡</div><p className="text-sm font-bold">小提示：越甜的水越「重」，重的會沉在下面，輕的會浮在上面喔！</p></div>
                                            )}
                                        </div>
                                    </div>
                                </motion.div>
                            )}

                            {/* 3. Report */}
                            {scene === 'report' && (
                                <motion.div key="report" initial={{ scale: 0.8, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} className="m-auto p-4 w-full max-w-2xl no-print">
                                    <div className="bg-white rounded-[2rem] shadow-2xl p-8 text-center border-4 border-brand-primary">
                                        <div className="text-6xl mb-6">🎉</div>
                                        <h2 className="text-4xl font-black text-slate-800 mb-6">實驗大成功！</h2>
                                        
                                        {!showNotes ? (
                                            <button onClick={() => { setShowNotes(true); speak("這是因為密度不同喔！糖加得越多，水就越重。"); }} className="bg-brand-accent text-white px-8 py-3 rounded-xl font-bold text-xl shadow-lg animate-bounce">
                                                為什麼會這樣？
                                            </button>
                                        ) : (
                                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }}>
                                                <div className="bg-blue-50 p-6 rounded-2xl mb-8 text-left">
                                                    <h3 className="font-bold text-blue-600 mb-2 text-xl">📝 實驗筆記：</h3>
                                                    <ul className="list-disc list-inside space-y-2 text-slate-700 font-bold">
                                                        <li>糖加得越多，水的<span className="text-brand-danger">密度</span>就越大。</li>
                                                        <li>密度大的水比較重，會沉在下面。</li>
                                                        <li>密度小的水比較輕，會浮在上面。</li>
                                                    </ul>
                                                </div>
                                                <button 
                                                    onClick={() => { setScene('quiz'); setQuizStep(0); speak("請輸入你的名字，準備挑戰測驗！"); }}
                                                    className="w-full bg-brand-secondary text-white py-4 rounded-xl font-bold text-xl shadow-lg flex items-center justify-center gap-2 hover:bg-indigo-600 transition-colors"
                                                >
                                                    <Icons.Award /> 挑戰測驗 領取證書
                                                </button>
                                            </motion.div>
                                        )}
                                    </div>
                                </motion.div>
                            )}

                            {/* 4. Quiz */}
                            {scene === 'quiz' && (
                                <motion.div key="quiz" initial={{ x: 100, opacity: 0 }} animate={{ x: 0, opacity: 1 }} className="m-auto p-4 w-full max-w-xl no-print">
                                    <div className="bg-white rounded-[2rem] shadow-2xl p-8 border-4 border-indigo-400 relative overflow-hidden">
                                        
                                        {quizStep === 0 ? (
                                            <div className="text-center">
                                                <div className="text-5xl mb-4">✍️</div>
                                                <h2 className="text-3xl font-black text-slate-800 mb-6">領取證書前，請告訴我你的名字</h2>
                                                <motion.div animate={isShaking ? { x: [-10, 10, -10, 10, 0] } : {}}>
                                                    <input 
                                                        type="text" 
                                                        placeholder="例如：小明"
                                                        value={studentName}
                                                        onChange={(e) => setStudentName(e.target.value)}
                                                        className="w-full text-center text-2xl p-4 border-2 border-indigo-200 rounded-xl mb-6 focus:outline-none focus:border-indigo-500 font-bold"
                                                    />
                                                </motion.div>
                                                <button onClick={startQuiz} className="w-full bg-brand-primary text-white py-3 rounded-xl font-bold text-xl hover:bg-blue-600 shadow-md">
                                                    開始測驗
                                                </button>
                                            </div>
                                        ) : (
                                            <div>
                                                <div className="flex justify-between items-center mb-6">
                                                    <span className="font-bold text-indigo-500 bg-indigo-50 px-3 py-1 rounded-full text-sm">問題 {quizStep} / {QUIZ_DATA.length}</span>
                                                </div>
                                                
                                                <motion.div key={`q${quizStep}`} initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }}>
                                                    <h2 className="text-2xl md:text-3xl font-black text-slate-800 mb-8 leading-tight">
                                                        {QUIZ_DATA[quizStep - 1].question}
                                                    </h2>
                                                    
                                                    <motion.div className="space-y-4" animate={isShaking ? { x: [-10, 10, -10, 10, 0] } : {}}>
                                                        {QUIZ_DATA[quizStep - 1].options.map((option, idx) => (
                                                            <button 
                                                                key={idx}
                                                                onClick={() => handleQuizAnswer(idx)}
                                                                className="w-full text-left p-5 border-2 border-slate-200 rounded-xl font-bold text-lg hover:border-brand-primary hover:bg-blue-50 transition-colors flex items-center gap-3 group"
                                                            >
                                                                <div className="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 group-hover:bg-brand-primary group-hover:text-white transition-colors">
                                                                    {['A', 'B', 'C'][idx]}
                                                                </div>
                                                                {option}
                                                            </button>
                                                        ))}
                                                    </motion.div>
                                                </motion.div>
                                            </div>
                                        )}
                                    </div>
                                </motion.div>
                            )}

                            {/* 5. Portrait Certificate */}
                            {scene === 'certificate' && (() => {
                                const award = getAwardInfo();
                                return (
                                <motion.div key="certificate" initial={{ scale: 0.8, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} className="m-auto p-4 w-full flex flex-col items-center">
                                    
                                    {/* 證書本體 (直向) */}
                                    <div id="printable-certificate" className="bg-white p-8 md:p-12 w-full max-w-lg min-h-[700px] shadow-2xl relative overflow-hidden flex flex-col items-center justify-between border-[12px] border-double border-slate-200">
                                        
                                        {/* 科學裝飾浮水印 (原子、DNA、燒杯) */}
                                        <div className="absolute inset-0 z-0 opacity-[0.03] text-indigo-900 pointer-events-none overflow-hidden">
                                            {/* 原子旋轉動畫 */}
                                            <svg className="absolute top-10 right-10 w-64 h-64 animate-[spin_30s_linear_infinite]" viewBox="0 0 100 100">
                                                <circle cx="50" cy="50" r="8" fill="currentColor"/>
                                                <ellipse cx="50" cy="50" rx="45" ry="15" fill="none" stroke="currentColor" strokeWidth="2" transform="rotate(30 50 50)"/>
                                                <ellipse cx="50" cy="50" rx="45" ry="15" fill="none" stroke="currentColor" strokeWidth="2" transform="rotate(90 50 50)"/>
                                                <ellipse cx="50" cy="50" rx="45" ry="15" fill="none" stroke="currentColor" strokeWidth="2" transform="rotate(150 50 50)"/>
                                            </svg>
                                            {/* DNA */}
                                            <svg className="absolute bottom-20 left-4 w-40 h-40" viewBox="0 0 100 100">
                                                <path d="M 30 10 Q 50 30 70 10 Q 50 50 30 90 Q 50 70 70 90" fill="none" stroke="currentColor" strokeWidth="4"/>
                                                <line x1="40" y1="20" x2="60" y2="20" stroke="currentColor" strokeWidth="2"/><line x1="45" y1="35" x2="55" y2="35" stroke="currentColor" strokeWidth="2"/><line x1="45" y1="65" x2="55" y2="65" stroke="currentColor" strokeWidth="2"/><line x1="40" y1="80" x2="60" y2="80" stroke="currentColor" strokeWidth="2"/>
                                            </svg>
                                            <Icons.Beaker className="absolute bottom-40 right-12 w-48 h-48" />
                                        </div>

                                        {/* 四個角落裝飾 */}
                                        <div className="absolute top-4 left-4 w-8 h-8 border-t-4 border-l-4 border-brand-primary z-10"></div>
                                        <div className="absolute top-4 right-4 w-8 h-8 border-t-4 border-r-4 border-brand-primary z-10"></div>
                                        <div className="absolute bottom-4 left-4 w-8 h-8 border-b-4 border-l-4 border-brand-primary z-10"></div>
                                        <div className="absolute bottom-4 right-4 w-8 h-8 border-b-4 border-r-4 border-brand-primary z-10"></div>

                                        {/* 標題區 */}
                                        <div className="text-center z-10 mt-4">
                                            <h1 className="text-5xl md:text-6xl font-black text-slate-800 tracking-widest mb-2 certificate-title">
                                                CERTIFICATE
                                            </h1>
                                            <h2 className="text-xl md:text-2xl font-bold text-brand-primary tracking-widest">
                                                科學實驗完成證書
                                            </h2>
                                        </div>

                                        {/* 獎牌區 */}
                                        <div className="z-10 flex flex-col items-center my-8">
                                            <div className="text-7xl md:text-8xl drop-shadow-xl mb-4">{award.icon}</div>
                                            <div className={`px-6 py-2 rounded-full font-black text-xl md:text-2xl ${award.bg} ${award.color} border-2 ${award.border} shadow-sm`}>
                                                {award.text}
                                            </div>
                                        </div>

                                        {/* 內文區 */}
                                        <div className="z-10 text-center w-full px-6 my-4">
                                            <p className="text-lg md:text-xl font-bold text-slate-500 mb-2">茲證明</p>
                                            <p className="text-3xl md:text-5xl font-black text-slate-800 border-b-2 border-slate-300 pb-2 mb-8 w-4/5 mx-auto">
                                                {studentName}
                                            </p>
                                            <p className="text-lg md:text-xl font-bold text-slate-600 leading-relaxed max-w-sm mx-auto">
                                                成功完成「彩虹分層水」科學實驗，<br/>
                                                並在密度原理測驗中表現優異，<br/>
                                                特發此證，以資鼓勵。
                                            </p>
                                        </div>

                                        {/* 底部簽名區 */}
                                        <div className="z-10 w-full flex justify-between items-end mt-12 px-2">
                                            <div className="text-center w-1/3">
                                                <p className="font-bold text-slate-800 border-b border-slate-400 pb-1 mb-1">{dateString}</p>
                                                <p className="text-sm font-bold text-slate-500">頒發日期 Date</p>
                                            </div>
                                            
                                            {/* 印章 */}
                                            <div className="w-24 h-24 border-4 border-red-500 rounded-full flex flex-col items-center justify-center transform -rotate-12 opacity-80 shadow-sm mx-2">
                                                <span className="text-red-500 font-bold text-[10px] tracking-widest">WMC</span>
                                                <span className="text-red-500 font-bold text-xs tracking-wider">SCIENCE</span>
                                                <span className="text-red-500 font-bold text-[10px] tracking-widest">LAB</span>
                                            </div>

                                            <div className="text-center w-1/3">
                                                <p className="font-black text-2xl text-slate-800 signature-font border-b border-slate-400 pb-1 mb-1">WMC 程sir</p>
                                                <p className="text-sm font-bold text-slate-500">指導老師 Instructor</p>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    {/* 操作按鈕 (列印時隱藏) */}
                                    <div className="mt-8 flex flex-wrap justify-center gap-4 no-print">
                                        <button onClick={() => window.print()} className="bg-brand-primary text-white px-8 py-3 rounded-full font-bold text-lg hover:bg-blue-600 transition-colors shadow-lg flex items-center gap-2">
                                            <Icons.Printer /> 列印直向證書
                                        </button>
                                        <button onClick={startExperiment} className="bg-slate-800 text-white px-8 py-3 rounded-full font-bold text-lg hover:bg-slate-700 transition-colors shadow-lg flex items-center gap-2">
                                            <Icons.RotateCcw /> 再玩一次
                                        </button>
                                    </div>
                                </motion.div>
                                );
                            })()}
                        </AnimatePresence>
                    </main>

                    {/* --- Footer --- */}
                    <footer className="fixed bottom-0 w-full bg-white/80 backdrop-blur-md border-t border-slate-200 py-2 px-6 flex justify-between items-center text-xs font-bold text-slate-400 z-30 no-print">
                        <button onClick={downloadHTML} className="flex items-center gap-2 hover:text-brand-primary hover:bg-blue-50 px-3 py-1 rounded transition-colors">
                            <Icons.Download /> 下載 HTML
                        </button>
                        <span>©2025 WMC</span>
                        <div className="w-10"></div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
